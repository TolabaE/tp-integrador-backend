{% extends 'base.html' %}

{% load crispy_forms_tags %} {% block content %}
    <h2 class="text-center">Registrarse</h2>
    <div class="card p-4">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary">Crear cuenta</button>
        </form>
    </div>
    <a href="{% url 'login' %}" class="nav nav-link">¿Ya tienes cuenta? Inicia sesión</a>
{% endblock %}
