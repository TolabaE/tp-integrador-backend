{% extends 'base.html' %}

{% block content %}
    <h1 class="text-center">Eliminar Producto</h1>
    <p>¿Estás seguro de que deseas eliminar el producto: <span class="font-weigth">"{{ producto.nombre }}"</span>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-success">Sí, eliminar</button>
        <a href="{% url 'listar_productos' %}" class="btn btn-danger">Cancelar</a>
    </form>
{% endblock %}
